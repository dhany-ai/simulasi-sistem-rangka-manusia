<svg viewBox="0 0 1200 300" width="1200" height="300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sistem Rangka Manusia — Simulator Anatomi Interaktif">
<title>Sistem Rangka Manusia — Simulator Anatomi Interaktif</title>
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#0a0d13"/>
    <stop offset="100%" stop-color="#121822"/>
  </linearGradient>
  <radialGradient id="glowCyan" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#7dd8ee" stop-opacity="0.24"/>
    <stop offset="100%" stop-color="#7dd8ee" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="glowAmber" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#eda85f" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#eda85f" stop-opacity="0"/>
  </radialGradient>
  <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
    <path d="M44 0H0V44" fill="none" stroke="#e8ecf2" stroke-opacity="0.045" stroke-width="1"/>
  </pattern>
</defs>

<rect width="1200" height="300" fill="url(#bg)"/>
<rect width="1200" height="300" fill="url(#grid)"/>
<ellipse cx="140" cy="20" rx="380" ry="230" fill="url(#glowCyan)"/>
<ellipse cx="1000" cy="150" rx="360" ry="260" fill="url(#glowCyan)" opacity="0.5"/>
<ellipse cx="1120" cy="300" rx="320" ry="200" fill="url(#glowAmber)"/>

<line x1="0" y1="1" x2="1200" y2="1" stroke="#e8ecf2" stroke-opacity="0.1"/>
<line x1="0" y1="299" x2="1200" y2="299" stroke="#e8ecf2" stroke-opacity="0.1"/>

<!-- eyebrow -->
<g transform="translate(60,56)">
  <line x1="0" y1="0" x2="22" y2="0" stroke="#7dd8ee" stroke-width="1.5"/>
  <text x="32" y="4.5" font-family="'IBM Plex Mono',Consolas,monospace" font-size="12.5" letter-spacing="3.2" fill="#7dd8ee">SIMULATOR ANATOMI DIGITAL</text>
</g>

<!-- title -->
<text x="58" y="140" font-family="'Space Grotesk',Arial,sans-serif" font-weight="700" font-size="58" letter-spacing="-1" fill="#e8ecf2">SISTEM RANGKA</text>
<text x="58" y="204" font-family="'Space Grotesk',Arial,sans-serif" font-weight="700" font-size="58" letter-spacing="-1" fill="#7dd8ee">MANUSIA</text>

<!-- subtitle -->
<text x="60" y="238" font-family="'Source Serif 4',Georgia,serif" font-size="16.5" fill="#8b96a8">Simulator anatomi interaktif — belajar lewat sentuhan, bukan sekadar bacaan</text>

<!-- footer stat line -->
<text x="60" y="268" font-family="'IBM Plex Mono',Consolas,monospace" font-size="12" letter-spacing="1.2" fill="#4c5566">206 TULANG   ·   6 FUNGSI UTAMA   ·   10 SOAL KUIS</text>

<!-- skeletal signature -->
<g transform="translate(838,4)">
  <ellipse cx="150" cy="150" rx="165" ry="155" fill="url(#glowCyan)"/>

  <!-- skull -->
  <ellipse cx="150" cy="44" rx="34" ry="32" fill="none" stroke="#7dd8ee" stroke-width="1.6" stroke-opacity="0.9"/>
  <circle cx="138" cy="44" r="4.4" fill="#7dd8ee" opacity="0.65"/>
  <circle cx="162" cy="44" r="4.4" fill="#7dd8ee" opacity="0.65"/>
  <path d="M142,62 Q150,68 158,62" stroke="#7dd8ee" stroke-width="1.4" fill="none" stroke-opacity="0.85"/>

  <!-- spine -->
  <path d="M150,76 Q146,120 150,158 Q154,196 150,232" fill="none" stroke="#7dd8ee" stroke-width="1.6" stroke-opacity="0.85"/>
  <circle cx="150" cy="88" r="2.8" fill="#eee3ca"/>
  <circle cx="148" cy="103" r="2.8" fill="#eee3ca"/>
  <circle cx="147" cy="118" r="2.8" fill="#eee3ca"/>
  <circle cx="148" cy="133" r="2.8" fill="#eee3ca"/>
  <circle cx="150" cy="148" r="2.8" fill="#eee3ca"/>
  <circle cx="152" cy="163" r="2.8" fill="#eee3ca"/>
  <circle cx="153" cy="178" r="2.8" fill="#eee3ca"/>
  <circle cx="152" cy="193" r="2.8" fill="#eee3ca"/>
  <circle cx="150" cy="208" r="2.8" fill="#eee3ca"/>

  <!-- ribcage -->
  <path d="M148,94 Q120,100 106,120" fill="none" stroke="#a89878" stroke-width="1.3" stroke-opacity="0.8"/>
  <path d="M152,94 Q180,100 194,120" fill="none" stroke="#a89878" stroke-width="1.3" stroke-opacity="0.8"/>
  <path d="M147,110 Q114,118 98,141" fill="none" stroke="#a89878" stroke-width="1.3" stroke-opacity="0.8"/>
  <path d="M153,110 Q186,118 202,141" fill="none" stroke="#a89878" stroke-width="1.3" stroke-opacity="0.8"/>
  <path d="M147,126 Q110,136 92,162" fill="none" stroke="#a89878" stroke-width="1.3" stroke-opacity="0.7"/>
  <path d="M153,126 Q190,136 208,162" fill="none" stroke="#a89878" stroke-width="1.3" stroke-opacity="0.7"/>
  <path d="M148,142 Q114,154 100,180" fill="none" stroke="#a89878" stroke-width="1.3" stroke-opacity="0.55"/>
  <path d="M152,142 Q186,154 200,180" fill="none" stroke="#a89878" stroke-width="1.3" stroke-opacity="0.55"/>

  <!-- pelvis -->
  <path d="M122,218 Q118,238 132,250 Q150,260 168,250 Q182,238 178,218 Q150,226 122,218 Z" fill="none" stroke="#eda85f" stroke-width="1.6" stroke-opacity="0.85"/>

  <!-- femur hint, cropped by frame -->
  <path d="M132,252 L120,292" stroke="#eda85f" stroke-width="1.4" stroke-opacity="0.45"/>
  <path d="M168,252 L180,292" stroke="#eda85f" stroke-width="1.4" stroke-opacity="0.45"/>
</g>
</svg>
